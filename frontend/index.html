<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Library Management System - Discover, book and manage your reading collection">
  <title>LibraryHub - Home</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="navbar-brand">📚 <span>LibraryHub</span></div>
    <div class="navbar-links" id="navLinks">
      <!-- Populated by JS -->
    </div>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1>Your Digital Library, Reimagined</h1>
      <p>Discover thousands of books, manage your personal shelf, and never miss a return date.</p>
      <button class="btn btn-primary" id="discoverBtn" style="padding: 1rem 2.5rem; font-size: 1.1rem;">
        📖 Discover Books
      </button>
    </div>
  </section>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      updateNavbar();

      document.getElementById("discoverBtn").addEventListener("click", () => {
        const token = localStorage.getItem("token");
        if (!token) {
          window.location.href = "pages/login.html";
        } else {
          window.location.href = "pages/discover.html";
        }
      });
    });
  </script>
</body>
</html>
