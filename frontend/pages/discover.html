<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover and browse books across 7 genres at LibraryHub. Search, filter, and find your next read.">
  <title>Discover Books - LibraryHub</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/footer.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="navbar-brand">📚 <span>LibraryHub</span></div>
    <div class="navbar-links" id="navLinks"></div>
  </nav>

  <div class="page-container">
    <div class="page-header">
      <h1>📖 Discover Books</h1>
    </div>

    <!-- Advanced Search & Filter Bar -->
    <div class="filter-bar" id="filterBar">
      <div class="filter-search">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search by book name..." class="filter-input" autocomplete="off" />
      </div>
      <div class="filter-group">
        <label for="genreFilter" class="filter-label">Genre</label>
        <select id="genreFilter" class="filter-select">
          <option value="all">All Genres</option>
          <option value="ICT">ICT</option>
          <option value="Science">Science</option>
          <option value="Mathematics">Mathematics</option>
          <option value="Economics">Economics</option>
          <option value="Business">Business</option>
          <option value="English">English</option>
          <option value="Engineering">Engineering</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="availabilityFilter" class="filter-label">Availability</label>
        <select id="availabilityFilter" class="filter-select">
          <option value="all">All Books</option>
          <option value="available">Available Only</option>
        </select>
      </div>
      <div class="filter-results" id="filterResults">
        <!-- Updated dynamically -->
      </div>
    </div>

    <div class="book-grid" id="bookGrid">
      <!-- Books loaded dynamically -->
    </div>
  </div>

  <!-- Personal Shelf Button -->
  <button class="shelf-btn-fixed" id="shelfBtn">📚 Personal Shelf</button>

  <!-- Personal Shelf Modal -->
  <div class="modal-overlay" id="shelfModal">
    <div class="modal">
      <div class="modal-header">
        <h2>📚 Personal Shelf</h2>
        <button class="modal-close" id="closeShelf">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Borrowed Books Section -->
        <div class="shelf-section">
          <h3>📕 Borrowed Books <span id="borrowCount" style="font-size:0.8rem; color: var(--text-muted);"></span></h3>
          <div id="borrowedList">
            <p class="shelf-empty">No borrowed books yet.</p>
          </div>
        </div>

        <!-- Wishlist Section -->
        <div class="shelf-section">
          <h3>💛 Wishlist</h3>
          <div id="wishlistList">
            <p class="shelf-empty">Your wishlist is empty.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Confirm Modal -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p id="confirmMsg">Are you sure?</p>
      <div class="confirm-actions">
        <button class="btn btn-outline btn-sm" id="confirmNo">Cancel</button>
        <button class="btn btn-primary btn-sm" id="confirmYes">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>
  <script>
  fetch("footer.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("footer").innerHTML = data;
    });
</script>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js?v=2"></script>
  <script src="../js/discover.js"></script>
  <script>
    document.getElementById("backToTop").addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
</body>
</html>
