<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/bookingseats.css">
  <title>3D Library Floor UI</title>
</head>
<body>

  <h1> Library Floor</h1>

  <div class="floor">
    <div class="library">

      <div class="table">
        <h3>Table 1</h3>
        <div class="seats">
          <button class="seat available">A1</button>
          <button class="seat available">A2</button>
          <button class="seat booked">A3</button>
          <button class="seat available">A4</button>
            <button class="seat available">A5</button>
          <button class="seat available">A6</button>
          <button class="seat booked">A7</button>
          <button class="seat available">A8</button>
        </div>
      </div>

      <div class="table">
        <h3>Table 2</h3>
        <div class="seats">
          <button class="seat available">B1</button>
          <button class="seat booked">B2</button>
          <button class="seat available">B3</button>
          <button class="seat available">B4</button>
           <button class="seat available">B5</button>
          <button class="seat booked">B6</button>
          <button class="seat available">B7</button>
          <button class="seat available">B8</button>
        </div>
      </div>

      <div class="table">
        <h3>Table 3</h3>
        <div class="seats">
          <button class="seat available">C1</button>
          <button class="seat available">C2</button>
          <button class="seat booked">C3</button>
          <button class="seat available">C4</button>
            <button class="seat available">C5</button>
          <button class="seat available">C6</button>
          <button class="seat booked">C7</button>
          <button class="seat available">C8</button>
        </div>
      </div>

      <div class="table">
        <h3>Table 4</h3>
        <div class="seats">
          <button class="seat available">D1</button>
          <button class="seat booked">D2</button>
          <button class="seat available">D3</button>
          <button class="seat available">D4</button>
             <button class="seat available">D5</button>
          <button class="seat booked">D6</button>
          <button class="seat available">D7</button>
          <button class="seat available">D8</button>
        </div>
      </div>

    </div>
  </div>

  <div class="legend">
    <span class="available">Available</span>
    <span class="booked">Booked</span>
  </div>

</body>
</html>
